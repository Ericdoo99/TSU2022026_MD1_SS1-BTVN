<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Format text <span style="background-color: yellow;">Marked</span></h1>
    <p>please use only HTML without CSS.</p>
    <ul>
        <li><p>This word is <em>emphasized</em>.</p></li>
        <li><p>This word is <i>italic</i>.</p></li>
        <li><p>This word is <sup>superscript</sup>.</p></li>
        <li><p>This word is <sub>subscript</sub>.</p></li>
        <li><p>This word is <u>underlined</u>.</p></li>
        <li><p>This word is <s>deleted</s>.</p></li>
        
</body>
</html>
